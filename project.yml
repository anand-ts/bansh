name: Bansh

options:
  createIntermediateGroups: true

settings:
  base:
    CLANG_CXX_LANGUAGE_STANDARD: gnu++17
    CLANG_CXX_LIBRARY: libc++
    CLANG_ENABLE_OBJC_ARC: YES
    CURRENT_PROJECT_VERSION: "1"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    MARKETING_VERSION: "0.1.1"
    PRODUCT_BUNDLE_IDENTIFIER: com.bansh.inputmethod.bansh
    PRODUCT_NAME: BanshInputMethod
    SDKROOT: macosx

targets:
  BanshInputMethod:
    type: application
    platform: macOS
    sources:
      - path: Sources/Core
      - path: Sources/InputMethod
    settings:
      base:
        INFOPLIST_FILE: Sources/InputMethod/Info.plist
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Manual
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
    dependencies:
      - framework: Cocoa.framework
      - framework: Carbon.framework
      - framework: InputMethodKit.framework
  BanshCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Sources/Core
        includes:
          - TransliterationSession.cpp
      - path: Sources/InputMethod
        includes:
          - BanshInputController.mm
      - path: Tests/CoreTests
        includes:
          - BanshCoreTests.mm
          - BanshInputControllerTests.mm
    settings:
      base:
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: YES
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Sources/Core
          - $(SRCROOT)/Sources/InputMethod
        LD_RUNPATH_SEARCH_PATHS:
          - $(inherited)
          - @executable_path/../Frameworks
          - @loader_path/../Frameworks
        PRODUCT_BUNDLE_IDENTIFIER: com.bansh.inputmethod.coretests
        PRODUCT_NAME: BanshCoreTests
    dependencies:
      - framework: XCTest.framework
      - framework: Cocoa.framework
      - framework: Carbon.framework
      - framework: InputMethodKit.framework
